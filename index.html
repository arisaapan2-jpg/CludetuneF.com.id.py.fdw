<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NebulAI Chat</title>
<style>
  :root{
    --bg-deep:#0a0118;
    --bg-mid:#120226;
    --neon-blue:#3df6ff;
    --neon-purple:#b14dff;
    --neon-pink:#ff4dd8;
    --text-light:#e8e3ff;
    --text-dim:#9b8fc9;
    --panel:rgba(20,8,45,0.75);
    --border-glow:rgba(177,77,255,0.35);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    height:100%;
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:radial-gradient(ellipse at top, var(--bg-mid), var(--bg-deep) 70%);
    color:var(--text-light);
    overflow:hidden;
  }
  #sky{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(177,77,255,0.15), transparent 50%),
      radial-gradient(ellipse at 80% 0%, rgba(61,246,255,0.12), transparent 50%);
  }
  .star{
    position:absolute;
    width:2px; height:2px;
    background:#fff;
    border-radius:50%;
    box-shadow:0 0 6px 1px rgba(255,255,255,0.8);
    opacity:0.8;
    animation:twinkle 3s infinite ease-in-out;
  }
  @keyframes twinkle{
    0%,100%{opacity:0.3;}
    50%{opacity:1;}
  }
  .shooting-star{
    position:absolute;
    width:3px;height:3px;
    background:linear-gradient(90deg,#fff,var(--neon-blue));
    border-radius:50%;
    box-shadow:0 0 10px 2px var(--neon-blue), 0 0 20px 6px rgba(177,77,255,0.5);
    animation:shoot linear forwards;
  }
  .shooting-star::before{
    content:'';
    position:absolute;
    top:50%; right:0;
    width:120px; height:1px;
    background:linear-gradient(90deg, transparent, var(--neon-purple), var(--neon-blue));
    transform:translateY(-50%);
  }
  @keyframes shoot{
    0%{ transform:translate(0,0) rotate(215deg); opacity:1; }
    85%{ opacity:1; }
    100%{ transform:translate(-1400px,1000px) rotate(215deg); opacity:0; }
  }

  /* ---------- Layout ---------- */
  .screen{
    position:relative; z-index:1;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .hidden{display:none !important;}

  /* ---------- Setup cards (API key / nama) ---------- */
  .card{
    width:100%; max-width:440px;
    background:var(--panel);
    border:1px solid var(--border-glow);
    border-radius:18px;
    padding:36px 32px;
    backdrop-filter:blur(14px);
    box-shadow:0 0 40px rgba(177,77,255,0.18), 0 0 80px rgba(61,246,255,0.08);
    animation:fadeUp 0.5s ease;
  }
  @keyframes fadeUp{
    from{opacity:0; transform:translateY(16px);}
    to{opacity:1; transform:translateY(0);}
  }
  .brand{
    text-align:center;
    margin-bottom:26px;
  }
  .brand .logo{
    font-size:34px;
    font-weight:800;
    letter-spacing:1px;
    background:linear-gradient(90deg,var(--neon-blue),var(--neon-purple),var(--neon-pink));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 30px rgba(177,77,255,0.4);
  }
  .brand .tag{
    color:var(--text-dim);
    font-size:13px;
    margin-top:6px;
    letter-spacing:0.5px;
  }
  label{
    display:block;
    font-size:13px;
    color:var(--text-dim);
    margin-bottom:8px;
    margin-top:18px;
  }
  label:first-of-type{margin-top:0;}
  input[type="password"], input[type="text"]{
    width:100%;
    padding:13px 14px;
    border-radius:10px;
    border:1px solid rgba(177,77,255,0.3);
    background:rgba(8,2,20,0.6);
    color:var(--text-light);
    font-size:14px;
    outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  input::placeholder{color:#5c4f86;}
  input:focus{
    border-color:var(--neon-blue);
    box-shadow:0 0 0 3px rgba(61,246,255,0.15);
  }
  .hint{
    font-size:11.5px;
    color:#6f63a0;
    margin-top:7px;
    line-height:1.5;
  }
  .hint a{color:var(--neon-blue); text-decoration:none;}
  .btn{
    width:100%;
    margin-top:24px;
    padding:13px;
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    color:#0a0118;
    background:linear-gradient(90deg,var(--neon-blue),var(--neon-purple));
    cursor:pointer;
    transition:filter .2s, transform .15s;
    box-shadow:0 0 20px rgba(61,246,255,0.3);
  }
  .btn:hover{filter:brightness(1.12);}
  .btn:active{transform:scale(0.98);}
  .err{
    color:#ff7a93;
    font-size:12.5px;
    margin-top:12px;
    min-height:14px;
  }

  /* ---------- Theme color picker (custom warna) ---------- */
  .swatches{display:flex; gap:10px; margin-top:8px;}
  .swatch{
    width:34px; height:34px;
    border-radius:50%;
    cursor:pointer;
    border:2px solid transparent;
    transition:transform .15s, border-color .15s;
  }
  .swatch:hover{transform:scale(1.1);}
  .swatch.active{border-color:#fff;}

  /* ---------- Chat screen ---------- */
  .app{
    position:relative; z-index:1;
    height:100vh;
    display:flex;
  }
  .sidebar{
    width:260px;
    background:rgba(10,3,24,0.85);
    border-right:1px solid var(--border-glow);
    display:flex;
    flex-direction:column;
    padding:18px;
    flex-shrink:0;
  }
  .sidebar .ai-name{
    font-weight:700;
    font-size:17px;
    background:linear-gradient(90deg,var(--neon-blue),var(--neon-purple));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin-bottom:18px;
  }
  .new-chat{
    padding:11px;
    border-radius:10px;
    border:1px solid var(--border-glow);
    background:rgba(177,77,255,0.08);
    color:var(--text-light);
    cursor:pointer;
    font-size:13.5px;
    margin-bottom:16px;
    transition:background .2s;
  }
  .new-chat:hover{background:rgba(177,77,255,0.18);}
  .history-list{
    flex:1;
    overflow-y:auto;
    display:flex; flex-direction:column; gap:6px;
  }
  .history-item{
    padding:10px 11px;
    border-radius:8px;
    font-size:12.5px;
    color:var(--text-dim);
    cursor:pointer;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    transition:background .15s, color .15s;
  }
  .history-item:hover, .history-item.active{
    background:rgba(61,246,255,0.1);
    color:var(--text-light);
  }
  .sidebar-foot{
    border-top:1px solid var(--border-glow);
    padding-top:12px;
    display:flex; flex-direction:column; gap:8px;
  }
  .ghost-btn{
    background:none; border:1px solid rgba(177,77,255,0.25);
    color:var(--text-dim); padding:9px; border-radius:8px;
    cursor:pointer; font-size:12px; transition:color .2s, border-color .2s;
  }
  .ghost-btn:hover{color:var(--text-light); border-color:var(--neon-blue);}

  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
  }
  .chat-header{
    padding:16px 24px;
    border-bottom:1px solid var(--border-glow);
    font-size:14px;
    color:var(--text-dim);
    display:flex; justify-content:space-between; align-items:center;
  }
  .chat-window{
    flex:1;
    overflow-y:auto;
    padding:24px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }
  .msg{
    max-width:72%;
    padding:13px 16px;
    border-radius:14px;
    font-size:14.5px;
    line-height:1.55;
    white-space:pre-wrap;
    animation:fadeUp .3s ease;
  }
  .msg.user{
    align-self:flex-end;
    background:linear-gradient(135deg, rgba(61,246,255,0.18), rgba(177,77,255,0.18));
    border:1px solid rgba(61,246,255,0.3);
    border-bottom-right-radius:4px;
  }
  .msg.ai{
    align-self:flex-start;
    background:rgba(177,77,255,0.08);
    border:1px solid var(--border-glow);
    border-bottom-left-radius:4px;
  }
  .msg.ai .who{
    font-size:11px;
    color:var(--neon-blue);
    margin-bottom:4px;
    font-weight:600;
  }
  .typing{display:flex; gap:4px; padding:4px 0;}
  .typing span{
    width:6px;height:6px;border-radius:50%;
    background:var(--neon-blue);
    animation:bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){animation-delay:0.15s;}
  .typing span:nth-child(3){animation-delay:0.3s;}
  @keyframes bounce{
    0%,80%,100%{transform:translateY(0); opacity:0.4;}
    40%{transform:translateY(-5px); opacity:1;}
  }
  .empty-state{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--text-dim); text-align:center; gap:10px;
  }
  .empty-state .big-logo{
    font-size:28px; font-weight:800;
    background:linear-gradient(90deg,var(--neon-blue),var(--neon-purple),var(--neon-pink));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .input-bar{
    padding:18px 24px;
    border-top:1px solid var(--border-glow);
    display:flex;
    gap:12px;
  }
  .input-bar textarea{
    flex:1;
    resize:none;
    background:rgba(8,2,20,0.6);
    border:1px solid rgba(177,77,255,0.3);
    border-radius:12px;
    padding:13px 14px;
    color:var(--text-light);
    font-size:14px;
    font-family:inherit;
    outline:none;
    max-height:140px;
  }
  .input-bar textarea:focus{border-color:var(--neon-blue); box-shadow:0 0 0 3px rgba(61,246,255,0.15);}
  .send-btn{
    width:48px; height:48px;
    border-radius:12px;
    border:none;
    background:linear-gradient(135deg,var(--neon-blue),var(--neon-purple));
    color:#0a0118;
    font-size:18px;
    cursor:pointer;
    flex-shrink:0;
    transition:filter .2s;
  }
  .send-btn:hover{filter:brightness(1.15);}
  .send-btn:disabled{opacity:0.4; cursor:not-allowed;}

  @media (max-width:760px){
    .sidebar{position:absolute; left:0; top:0; height:100%; z-index:5; transform:translateX(-100%); transition:transform .25s;}
    .sidebar.open{transform:translateX(0);}
    .msg{max-width:88%;}
    .menu-btn{display:inline-block !important;}
  }
  .menu-btn{display:none; background:none; border:none; color:var(--text-light); font-size:20px; cursor:pointer;}
</style>
</head>
<body>

<div id="sky"></div>

<!-- ===== Screen 1: API Key Groq ===== -->
<div class="screen" id="screen-key">
  <div class="card">
    <div class="brand">
      <div class="logo">NebulAI</div>
      <div class="tag">Chat AI bertema galaksi neon</div>
    </div>
    <label for="apikey">API Key Groq</label>
    <input type="password" id="apikey" placeholder="gsk_xxxxxxxxxxxxxxxxxxxx">
    <div class="hint">Belum punya API key? Ambil gratis di <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a>. Key hanya disimpan di browser kamu sendiri.</div>
    <button class="btn" onclick="saveKey()">Lanjutkan</button>
    <div class="err" id="key-err"></div>
  </div>
</div>

<!-- ===== Screen 2: Setup nama & tema ===== -->
<div class="screen hidden" id="screen-setup">
  <div class="card">
    <div class="brand">
      <div class="logo">Atur AI Kamu</div>
      <div class="tag">Custom nama & warna tema</div>
    </div>
    <label for="ainame">Nama AI</label>
    <input type="text" id="ainame" placeholder="Misal: Nova, Lumi, Starly...">

    <label>Aksen warna tema</label>
    <div class="swatches" id="swatches">
      <div class="swatch active" data-blue="#3df6ff" data-purple="#b14dff" style="background:linear-gradient(135deg,#3df6ff,#b14dff)"></div>
      <div class="swatch" data-blue="#4d8dff" data-purple="#9d4dff" style="background:linear-gradient(135deg,#4d8dff,#9d4dff)"></div>
      <div class="swatch" data-blue="#3dfff0" data-purple="#d44dff" style="background:linear-gradient(135deg,#3dfff0,#d44dff)"></div>
      <div class="swatch" data-blue="#5dc1ff" data-purple="#7a3dff" style="background:linear-gradient(135deg,#5dc1ff,#7a3dff)"></div>
    </div>

    <button class="btn" onclick="startChat()">Mulai Chat</button>
  </div>
</div>

<!-- ===== Screen 3: Chat app ===== -->
<div class="app hidden" id="screen-chat">
  <div class="sidebar" id="sidebar">
    <div class="ai-name" id="sidebar-ai-name">NebulAI</div>
    <button class="new-chat" onclick="newChat()">+ Obrolan Baru</button>
    <div class="history-list" id="history-list"></div>
    <div class="sidebar-foot">
      <button class="ghost-btn" onclick="openSetup()">Ubah nama & tema</button>
      <button class="ghost-btn" onclick="clearHistory()">Hapus semua riwayat</button>
      <button class="ghost-btn" onclick="resetKey()">Ganti API key</button>
    </div>
  </div>
  <div class="main">
    <div class="chat-header">
      <span><button class="menu-btn" onclick="toggleSidebar()">☰</button> <span id="header-title">Obrolan baru</span></span>
      <span id="model-tag">Llama 3.3 70B · Groq</span>
    </div>
    <div class="chat-window" id="chat-window">
      <div class="empty-state" id="empty-state">
        <div class="big-logo" id="empty-name">NebulAI</div>
        <div>Tulis sesuatu untuk mulai mengobrol di antara bintang jatuh ✦</div>
      </div>
    </div>
    <div class="input-bar">
      <textarea id="msg-input" rows="1" placeholder="Ketik pesan..." onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
/* ===================== State ===================== */
let apiKey = '';
let aiName = 'NebulAI';
let chats = JSON.parse(localStorage.getItem('nebulai_chats') || '[]');
let currentChatId = null;

/* ===================== Background: stars + shooting stars ===================== */
function initSky(){
  const sky = document.getElementById('sky');
  for(let i=0;i<80;i++){
    const s = document.createElement('div');
    s.className='star';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.animationDelay = (Math.random()*3)+'s';
    const size = Math.random()*2+1;
    s.style.width = size+'px';
    s.style.height = size+'px';
    sky.appendChild(s);
  }
  spawnShootingStar();
}
function spawnShootingStar(){
  const sky = document.getElementById('sky');
  const s = document.createElement('div');
  s.className='shooting-star';
  s.style.left = (Math.random()*70+15)+'%';
  s.style.top = (Math.random()*20)+'%';
  s.style.animationDuration = (1+Math.random()*1.2)+'s';
  sky.appendChild(s);
  s.addEventListener('animationend', ()=> s.remove());
  const next = 1500 + Math.random()*3500;
  setTimeout(spawnShootingStar, next);
}
initSky();

/* ===================== Screen 1: API Key ===================== */
function saveKey(){
  const val = document.getElementById('apikey').value.trim();
  if(!val){
    document.getElementById('key-err').textContent = 'Masukkan API key Groq kamu dulu.';
    return;
  }
  apiKey = val;
  sessionStorage.setItem('groq_key', apiKey);
  document.getElementById('screen-key').classList.add('hidden');

  const savedName = localStorage.getItem('nebulai_name');
  const savedBlue = localStorage.getItem('nebulai_blue');
  const savedPurple = localStorage.getItem('nebulai_purple');
  if(savedName){
    aiName = savedName;
    if(savedBlue && savedPurple) applyTheme(savedBlue, savedPurple);
    enterChatScreen();
  } else {
    document.getElementById('screen-setup').classList.remove('hidden');
  }
}

function resetKey(){
  sessionStorage.removeItem('groq_key');
  apiKey='';
  document.getElementById('screen-chat').classList.add('hidden');
  document.getElementById('screen-setup').classList.add('hidden');
  document.getElementById('apikey').value='';
  document.getElementById('screen-key').classList.remove('hidden');
}

/* ===================== Screen 2: Setup nama & tema ===================== */
document.getElementById('swatches').addEventListener('click', (e)=>{
  const sw = e.target.closest('.swatch');
  if(!sw) return;
  document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));
  sw.classList.add('active');
});

function applyTheme(blue, purple){
  document.documentElement.style.setProperty('--neon-blue', blue);
  document.documentElement.style.setProperty('--neon-purple', purple);
}

function openSetup(){
  document.getElementById('screen-chat').classList.add('hidden');
  document.getElementById('ainame').value = aiName;
  document.getElementById('screen-setup').classList.remove('hidden');
}

function startChat(){
  const nameVal = document.getElementById('ainame').value.trim();
  aiName = nameVal || 'NebulAI';
  const activeSwatch = document.querySelector('.swatch.active');
  const blue = activeSwatch.dataset.blue;
  const purple = activeSwatch.dataset.purple;
  applyTheme(blue, purple);

  localStorage.setItem('nebulai_name', aiName);
  localStorage.setItem('nebulai_blue', blue);
  localStorage.setItem('nebulai_purple', purple);

  document.getElementById('screen-setup').classList.add('hidden');
  enterChatScreen();
}

function enterChatScreen(){
  document.getElementById('screen-chat').classList.remove('hidden');
  document.getElementById('sidebar-ai-name').textContent = aiName;
  document.getElementById('empty-name').textContent = aiName;
  renderHistoryList();
  if(chats.length > 0){
    loadChat(chats[0].id);
  } else {
    newChat();
  }
}

/* ===================== Chat logic ===================== */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

function newChat(){
  currentChatId = uid();
  chats.unshift({ id:currentChatId, title:'Obrolan baru', messages:[] });
  saveChats();
  renderHistoryList();
  renderMessages();
  document.getElementById('header-title').textContent = 'Obrolan baru';
  closeSidebarMobile();
}

function loadChat(id){
  currentChatId = id;
  const chat = chats.find(c=>c.id===id);
  document.getElementById('header-title').textContent = chat ? chat.title : 'Obrolan baru';
  renderMessages();
  renderHistoryList();
  closeSidebarMobile();
}

function getCurrentChat(){
  return chats.find(c=>c.id===currentChatId);
}

function saveChats(){
  localStorage.setItem('nebulai_chats', JSON.stringify(chats));
}

function clearHistory(){
  if(!confirm('Hapus semua riwayat obrolan?')) return;
  chats = [];
  saveChats();
  newChat();
}

function renderHistoryList(){
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  chats.forEach(c=>{
    const item = document.createElement('div');
    item.className = 'history-item' + (c.id===currentChatId ? ' active' : '');
    item.textContent = c.title || 'Obrolan baru';
    item.onclick = ()=> loadChat(c.id);
    list.appendChild(item);
  });
}

function renderMessages(){
  const win = document.getElementById('chat-window');
  const chat = getCurrentChat();
  win.innerHTML = '';
  if(!chat || chat.messages.length===0){
    win.innerHTML = `<div class="empty-state"><div class="big-logo">${aiName}</div><div>Tulis sesuatu untuk mulai mengobrol di antara bintang jatuh ✦</div></div>`;
    return;
  }
  chat.messages.forEach(m=>{
    const div = document.createElement('div');
    div.className = 'msg ' + (m.role==='user' ? 'user' : 'ai');
    if(m.role==='assistant'){
      div.innerHTML = `<div class="who">${aiName}</div>` + escapeHtml(m.content);
    } else {
      div.textContent = m.content;
    }
    win.appendChild(div);
  });
  win.scrollTop = win.scrollHeight;
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function handleKey(e){
  if(e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
}

async function sendMessage(){
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if(!text) return;
  const chat = getCurrentChat();
  if(!chat) return;

  chat.messages.push({role:'user', content:text});
  if(chat.title==='Obrolan baru'){
    chat.title = text.slice(0,32) + (text.length>32?'...':'');
    document.getElementById('header-title').textContent = chat.title;
  }
  input.value='';
  saveChats();
  renderMessages();
  renderHistoryList();

  const sendBtn = document.getElementById('send-btn');
  sendBtn.disabled = true;

  const win = document.getElementById('chat-window');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'msg ai';
  typingDiv.innerHTML = `<div class="who">${aiName}</div><div class="typing"><span></span><span></span><span></span></div>`;
  win.appendChild(typingDiv);
  win.scrollTop = win.scrollHeight;

  try{
    const reply = await callGroq(chat.messages);
    typingDiv.remove();
    chat.messages.push({role:'assistant', content:reply});
    saveChats();
    renderMessages();
  }catch(err){
    typingDiv.remove();
    chat.messages.push({role:'assistant', content:'⚠️ Gagal menghubungi Groq: ' + err.message});
    renderMessages();
  }finally{
    sendBtn.disabled = false;
  }
}

async function callGroq(messageHistory){
  const sysPrompt = `Kamu adalah ${aiName}, asisten AI yang ramah, suportif, dan komunikatif dalam Bahasa Indonesia kecuali diminta lain.`;
  const payload = {
    model: 'llama-3.3-70b-versatile',
    messages: [
      { role:'system', content: sysPrompt },
      ...messageHistory.map(m=>({role:m.role, content:m.content}))
    ],
    temperature: 0.7
  };

  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization': 'Bearer ' + apiKey
    },
    body: JSON.stringify(payload)
  });

  if(!res.ok){
    const errData = await res.json().catch(()=>({}));
    throw new Error(errData.error?.message || ('HTTP ' + res.status));
  }
  const data = await res.json();
  return data.choices?.[0]?.message?.content || '(tidak ada respons)';
}

/* ===================== Mobile sidebar ===================== */
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
}
function closeSidebarMobile(){
  if(window.innerWidth<=760) document.getElementById('sidebar').classList.remove('open');
}

/* ===================== Boot ===================== */
(function boot(){
  const savedKey = sessionStorage.getItem('groq_key');
  if(savedKey){
    apiKey = savedKey;
    document.getElementById('screen-key').classList.add('hidden');
    const savedName = localStorage.getItem('nebulai_name');
    const savedBlue = localStorage.getItem('nebulai_blue');
    const savedPurple = localStorage.getItem('nebulai_purple');
    if(savedName){
      aiName = savedName;
      if(savedBlue && savedPurple) applyTheme(savedBlue, savedPurple);
      enterChatScreen();
    } else {
      document.getElementById('screen-setup').classList.remove('hidden');
    }
  }
})();
</script>
